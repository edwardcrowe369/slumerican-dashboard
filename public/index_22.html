<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murder Cigars — Content Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
<script src="brand.js"></script>
<script>
/* Apply brand theme as early as possible (before paint) */
(function(){
  var B = window.BRAND || {};
  try{
    if(B.fontUrl){ var l=document.createElement('link'); l.rel='stylesheet'; l.href=B.fontUrl; document.head.appendChild(l); }
    var c=B.colors||{}, root=document.documentElement;
    var map={bg:'--bg',panel:'--panel',panelAlt:'--panelAlt',line:'--line',text:'--text',dim:'--dim',faint:'--faint',primary:'--gold',primaryDim:'--goldDim',onAccent:'--onAccent',signature:'--signature',green:'--green',red:'--red',blue:'--blue'};
    for(var k in map){ if(c[k]) root.style.setProperty(map[k], c[k]); }
    if(B.wordmarkFont) root.style.setProperty('--wordmarkFont', B.wordmarkFont);
    if(B.title) document.title=B.title;
  }catch(e){}
})();
</script>
<style>
  :root{
    --bg:#0a0807; --panel:#141110; --panelAlt:#1b1715;
    --line:#2a2421; --lineSoft:#221e1b;
    --text:#ffffff; --dim:#f0edea; --faint:#cfcac5;
    --gold:#f4f4f2; --goldDim:#5c5c5a; --onAccent:#0b0b0b;
    --signature:#9a9a97;
    --bloodDeep:#4a0c0a;
    --green:#e6e6e2; --red:#6e6e6a; --blue:#a6a6a2;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .serif{font-family:Georgia,'Times New Roman',serif;}
  button{font-family:inherit;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px;}

  .hdr{position:relative;overflow:hidden;border-bottom:1px solid var(--line);padding:26px 28px;display:flex;align-items:center;justify-content:space-between;}
  .hdrSplat{position:absolute;inset:0;background-repeat:no-repeat;background-position:right center;background-size:cover;opacity:.6;pointer-events:none;z-index:0;}
  #bgSplat{position:fixed;inset:0;background-repeat:no-repeat;background-position:center;background-size:cover;opacity:.32;pointer-events:none;z-index:-1;}
  .brand,.social{position:relative;z-index:1;}
  .brand{display:flex;align-items:center;gap:14px;}
  .mark{width:38px;height:38px;border:1px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--gold);}
  .wordmark{font-family:var(--wordmarkFont,'Pirata One','Georgia',serif);font-size:30px;letter-spacing:2px;color:var(--gold);line-height:1;}
  .logo{height:44px;width:auto;display:block;image-rendering:-webkit-optimize-contrast;}
  .subhead{font-size:11px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;padding-left:14px;border-left:1px solid var(--line);align-self:center;}
  .social{display:flex;gap:16px;color:var(--faint);}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-bottom:1px solid var(--line);}
  .stat{background:var(--bg);padding:18px 28px;}
  .stat .k{font-size:11px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;margin-bottom:6px;}
  .stat .v{font-size:30px;font-weight:300;}
  #warnBar{display:none;background:#2a1916;color:var(--red);border-bottom:1px solid var(--line);padding:10px 28px;font-size:12.5px;line-height:1.4;}

  .layout{display:grid;grid-template-columns:380px 1fr;}
  .create{border-right:1px solid var(--line);padding:28px;}
  .board{padding:28px;}
  .panelTitle{margin:0 0 20px;font-size:15px;font-weight:500;letter-spacing:1px;text-transform:uppercase;}

  .seg{display:flex;gap:8px;margin-bottom:16px;}
  .seg button{flex:1;padding:8px 4px;background:transparent;color:var(--dim);border:1px solid var(--line);border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;letter-spacing:.5px;transition:all .15s;}
  .seg button.on{background:var(--gold);color:var(--onAccent);border-color:var(--gold);}
  .seg.soft button.on{background:var(--panelAlt);color:var(--gold);border-color:var(--goldDim);}

  .label{display:block;font-size:11px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
  .label svg{vertical-align:-2px;margin-right:5px;}
  textarea,select,input[type=time]{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
  input[type=time]{color-scheme:dark;}
  textarea{height:88px;resize:none;}
  textarea:focus,select:focus,input[type=time]:focus{border-color:var(--goldDim);}
  .count{text-align:right;font-size:11px;color:var(--faint);margin:4px 0 16px;}
  .schedRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}

  .drop{border:2px dashed var(--line);border-radius:6px;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;text-align:center;}
  .drop.drag{border-color:var(--gold);background:var(--panelAlt);}
  .drop svg{color:var(--faint);}
  .drop .t1{color:var(--dim);font-size:13px;margin-top:10px;}
  .drop .t2{color:var(--faint);font-size:11px;margin-top:4px;}

  .previewWrap{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:#000;}
  .previewWrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .thumb{position:relative;width:54px;height:54px;border-radius:4px;overflow:hidden;border:1px solid var(--line);cursor:pointer;}
  .thumb.on{border-color:var(--gold);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb .del{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(10,8,7,.85);border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;padding:0;}
  .thumb .mv{position:absolute;bottom:2px;width:18px;height:18px;border-radius:4px;background:rgba(10,8,7,.82);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  .thumb .mvL{left:2px;} .thumb .mvR{right:2px;}
  .thumb .mv:hover{background:var(--gold);}
  .thumb .cover{position:absolute;bottom:2px;left:2px;font-size:8px;font-weight:600;letter-spacing:.5px;padding:2px 5px;border-radius:3px;background:var(--gold);color:var(--onAccent);line-height:1;}
  .reorderHint{font-size:11px;color:var(--faint);margin:2px 0 0;}
  .addThumb{width:54px;height:54px;border-radius:4px;border:1px dashed var(--line);background:transparent;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .addThumb:hover{border-color:var(--goldDim);color:var(--gold);}
  .clearAll{margin:10px 0 16px;background:none;border:none;color:var(--faint);font-size:11px;cursor:pointer;text-decoration:underline;padding:0;}

  /* carousel nav (shared by preview + cards) */
  .carNav{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(10,8,7,.7);border:1px solid var(--line);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;padding:0;}
  .carNav:hover{background:rgba(10,8,7,.92);border-color:var(--goldDim);color:var(--gold);}
  .carNav.prev{left:8px;} .carNav.next{right:8px;}
  .carCount{position:absolute;bottom:10px;right:10px;font-size:10px;letter-spacing:.5px;padding:3px 8px;background:rgba(10,8,7,.8);border-radius:10px;color:var(--text);z-index:2;display:flex;align-items:center;gap:4px;}
  .carDots{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2;}
  .carDots i{width:6px;height:6px;border-radius:50%;background:rgba(236,230,223,.4);display:block;}
  .carDots i.on{background:var(--gold);}

  .submitRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .btnGhost{padding:12px;background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;}
  .btnGold{padding:12px;background:var(--gold);border:1px solid var(--gold);color:var(--onAccent);border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;}
  .btnGhost svg,.btnGold svg{vertical-align:-2px;margin-right:6px;}

  .filters{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;}
  .filters button{padding:7px 14px;background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:20px;cursor:pointer;font-size:12.5px;font-weight:500;}
  .filters button.on{background:var(--panelAlt);border-color:var(--goldDim);color:var(--gold);}
  .filters .c{color:var(--faint);margin-left:2px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
  .empty{padding:80px 0;text-align:center;color:var(--faint);font-size:14px;}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
  .cardImg{position:relative;background:#000;max-height:340px;overflow:hidden;}
  .cardImg img{width:100%;height:100%;object-fit:cover;display:block;}
  .tagFrame{position:absolute;top:10px;left:10px;font-size:10px;letter-spacing:1px;padding:3px 8px;background:rgba(10,8,7,.8);border:1px solid var(--line);border-radius:3px;color:var(--dim);z-index:2;}
  .tagStatus{position:absolute;top:10px;right:10px;font-size:10px;letter-spacing:.5px;padding:4px 9px;border-radius:3px;font-weight:600;z-index:2;}
  .cardBody{padding:14px;display:flex;flex-direction:column;gap:9px;flex:1;}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);}
  .meta svg{vertical-align:-1px;margin-right:3px;}
  .cap{margin:0;font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .songline{font-size:11.5px;color:var(--signature);display:flex;align-items:center;gap:6px;}
  .songline span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  a.songline{text-decoration:none;}
  .songLink:hover span{text-decoration:underline;}
  .songline .slArt{width:20px;height:20px;border-radius:3px;object-fit:cover;background:#000;flex:0 0 auto;}
  .songPick{position:relative;}
  #songSearch{width:100%;background:#000;border:1px solid var(--gold);border-radius:4px;padding:10px 12px;color:#fff;font-size:13px;font-family:inherit;outline:none;}
  #songSearch::placeholder{color:#cfc9c4;}
  #songSearch:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,255,255,.30);}
  .songResults{position:absolute;left:0;right:0;top:42px;z-index:5;background:#0d0a09;border:1px solid var(--gold);border-radius:6px;max-height:240px;overflow-y:auto;display:none;}
  .songResults.show{display:block;}
  .songRes{display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--lineSoft);}
  .songRes:hover{background:rgba(255,255,255,.10);}
  .songRes img{width:34px;height:34px;border-radius:3px;object-fit:cover;flex:0 0 auto;background:#000;}
  .songRes .rmeta{min-width:0;flex:1;}
  .rPlay{flex:0 0 auto;background:transparent;border:1px solid var(--gold);color:var(--gold);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .rPlay:hover{border-color:var(--gold);background:rgba(255,255,255,.14);}
  .slPlay{flex:0 0 auto;background:transparent;border:none;color:var(--signature);cursor:pointer;padding:0;margin-left:2px;display:inline-flex;align-items:center;}
  .songRes .rn{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .songRes .ra{font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .songMsg{padding:9px 11px;font-size:12px;color:var(--dim);}
  .songSelected{display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px;background:#0d0a09;border:1px solid var(--goldDim);border-radius:6px;}
  .songSelected img{width:38px;height:38px;border-radius:3px;object-fit:cover;background:#000;flex:0 0 auto;}
  .ss-meta{min-width:0;flex:1;}
  .ss-name{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ss-artist{font-size:11px;color:var(--signature);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ss-clear{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;flex:0 0 auto;}
  .songNone{margin-top:8px;background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:4px;padding:6px 12px;font-size:11px;cursor:pointer;}
  .libSection{border-bottom:1px solid var(--line);padding:20px 28px;}
  .libHead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .libToggle{background:none;border:none;color:var(--faint);cursor:pointer;padding:2px;display:flex;align-items:center;transition:transform .2s;}
  .libToggle.collapsed{transform:rotate(-90deg);}
  .libToggle:hover{color:var(--gold);}
  .libCount{font-size:11px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;}
  .libHeadRight{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .libViewSeg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
  .libViewSeg button{background:transparent;border:none;color:var(--faint);font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:7px 13px;cursor:pointer;}
  .libViewSeg button.on{background:var(--gold);color:var(--onAccent);}
  .libWrap{transition:outline .15s;}
  .libWrap.drag{outline:2px dashed var(--gold);outline-offset:6px;border-radius:12px;}
  /* horizontal filmstrip (compact default) */
  .libStripWrap{position:relative;}
  .libStripWrap::after{content:"";position:absolute;top:0;right:0;bottom:12px;width:46px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none;}
  .libStrip{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 12px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;}
  .libStrip .libItem,.libStrip .libAdd{flex:0 0 94px;width:94px;height:94px;scroll-snap-align:start;}
  .libStrip::-webkit-scrollbar{height:6px;}
  .libStrip::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .libStrip::-webkit-scrollbar-track{background:transparent;}
  /* compact grid (expand view) */
  .libGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:10px;max-height:300px;overflow-y:auto;padding:4px 2px;}
  .libGrid .libItem,.libGrid .libAdd{aspect-ratio:1;width:auto;}
  /* shared tile */
  .libItem{position:relative;border-radius:10px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:#000;transition:transform .15s,border-color .15s,box-shadow .15s;}
  .libItem img{width:100%;height:100%;object-fit:cover;display:block;}
  .libItem:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.55);}
  .libItem.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,255,255,.35);}
  .libCheck{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;border:2px solid #fff;background:rgba(10,8,7,.5);display:flex;align-items:center;justify-content:center;color:#fff;opacity:0;transition:opacity .15s;}
  .libItem:hover .libCheck,.libItem.sel .libCheck{opacity:1;}
  .libItem.sel .libCheck{background:var(--gold);border-color:var(--gold);}
  .libDel{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:rgba(10,8,7,.8);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;padding:0;opacity:0;transition:opacity .15s;}
  .libItem:hover .libDel{opacity:1;}
  .libDel:hover{background:var(--gold);}
  /* add tile */
  .libAdd{border:2px dashed var(--line);border-radius:10px;background:var(--panel);color:var(--faint);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all .15s;font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;}
  .libAdd:hover{border-color:var(--gold);color:var(--gold);background:var(--panelAlt);transform:translateY(-2px);}
  .libEmpty{color:var(--faint);font-size:12.5px;padding:10px 2px 0;}
  .libBar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px;}
  .libBar:empty{margin-top:0;}
  .libAct{background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:4px;padding:9px 16px;font-size:12px;font-weight:500;cursor:pointer;}
  .libAct.primary{background:var(--gold);border-color:var(--gold);color:var(--onAccent);font-weight:600;}
  .libAct:disabled{opacity:.4;cursor:default;}
  .libLink{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;text-decoration:underline;padding:4px;}
  .actions{margin-top:auto;padding-top:10px;border-top:1px solid var(--lineSoft);display:flex;gap:8px;}
  .act{flex:1;padding:8px 6px;background:transparent;border:1px solid var(--line);border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px;}
  .act.icon{flex:0 0 auto;width:34px;padding:8px;}
  .act:hover{border-color:var(--gold);}
  .act[disabled]{opacity:.5;cursor:default;}
  /* board tools (sync) */
  .boardTools{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:14px;}
  .liveDot{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:6px 11px;border-radius:999px;border:1px solid var(--line);color:var(--faint);white-space:nowrap;}
  .liveDot .blip{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 0 0 currentColor;}
  .liveDot.live{color:#36c46b;border-color:rgba(54,196,107,.4);background:rgba(54,196,107,.08);}
  .liveDot.live .blip{animation:livePulse 1.8s infinite;}
  .liveDot.connecting{color:var(--signature);border-color:rgba(201,160,106,.4);background:rgba(201,160,106,.08);}
  .liveDot.error{color:#e7625f;border-color:rgba(231,98,95,.45);background:rgba(231,98,95,.08);}
  .liveDot.local{color:var(--faint);}
  @keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(54,196,107,.5);}70%{box-shadow:0 0 0 6px rgba(54,196,107,0);}100%{box-shadow:0 0 0 0 rgba(54,196,107,0);}}
  .boardTools .syncBtn{margin-right:auto;}
  .syncBtn{display:inline-flex;align-items:center;gap:7px;background:#0d0a09;border:1px solid var(--line);color:var(--dim);padding:9px 15px;border-radius:8px;cursor:pointer;font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;}
  .syncBtn:hover{border-color:var(--gold);color:var(--text);}
  .syncBtn[disabled]{opacity:.55;cursor:default;}
  /* review response on card */
  .reviewChip{margin-top:9px;font-size:12px;border-radius:8px;padding:9px 11px;border:1px solid var(--lineSoft);line-height:1.45;}
  .reviewChip.ok{border-color:#2c4022;background:#141d10;}
  .reviewChip.no{border-color:#43201c;background:#1d1210;}
  .reviewChip.await{border-color:var(--goldDim);background:#160c0b;color:var(--signature);}
  .reviewChip .rcHead{font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:11px;display:flex;align-items:center;gap:6px;}
  .reviewChip .who{color:var(--faint);font-size:11px;margin-top:2px;}
  .reviewChip .cmt{color:var(--dim);margin-top:5px;}
  .reviewChip .copyLink{display:inline-flex;align-items:center;gap:5px;margin-top:6px;background:none;border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;}
  .reviewChip .copyLink:hover{border-color:var(--gold);color:var(--text);}
  /* share modal */
  .mcModalWrap{position:fixed;inset:0;background:rgba(0,0,0,.74);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .mcModal{background:var(--panel);border:1px solid var(--gold);border-radius:14px;max-width:480px;width:100%;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.6);}
  .mcModal h3{margin:0 0 6px;font-size:18px;color:var(--text);}
  .mcModal p{margin:0 0 16px;font-size:13px;color:var(--faint);line-height:1.5;}
  .mcModal .linkRow{display:flex;gap:8px;margin-bottom:14px;}
  .mcModal input{flex:1;background:#000;border:1px solid var(--gold);color:#fff;border-radius:8px;padding:11px 12px;font-size:13px;}
  .mcModal .mBtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--dim);}
  .mcModal .mBtn.primary{background:var(--gold);border-color:var(--gold);color:var(--onAccent);}
  .mcModal .mBtn:hover{border-color:var(--gold);color:#fff;}
  .mcModal .mBtn.primary:hover{background:#a81916;}
  .mcModal .mRow{display:flex;gap:8px;justify-content:flex-end;}

/* ---------- config ---------- */
const SONGS = ["No music","Sinnerman — Nina Simone (instrumental)","So What — Miles Davis","Feeling Good — Lo-fi flip","Midnight Harlem — Soul groove","Slow Burn — Trap instrumental","Smoke & Velvet — Dark jazz","After Hours — Ambient R&B"];

/* time helpers: store/display as 12h "h:mm AM/PM"; native input uses 24h "HH:MM" */
function to12(hhmm){
  if(!hhmm) return "";
  const m = String(hhmm).match(/^(\d{1,2}):(\d{2})/); if(!m) return "";
  let h=+m[1]; const min=m[2], ap=h>=12?"PM":"AM"; let hr=h%12; if(hr===0) hr=12;
  return hr+":"+min+" "+ap;
}
function to24(disp){
  if(!disp) return "";
  const m = String(disp).match(/^(\d{1,2}):(\d{2})\s*(AM|PM)?$/i); if(!m) return "";
  let h=+m[1]; const min=m[2], ap=m[3];
  if(ap){ if(/pm/i.test(ap)&&h!==12) h+=12; if(/am/i.test(ap)&&h===12) h=0; }
  return String(h).padStart(2,"0")+":"+min;
}

/* ---------- persistence ---------- */
function normalizePost(p){
  const o = Object.assign({}, p);
  if(!o.images) o.images = o.image ? [o.image] : [];
  if(o.day===undefined||o.day===null) o.day="";
  if(o.time===undefined||o.time===null) o.time="";
  return o;
}
function findPost(id){ id=String(id); return state.posts.find(x=>String(x.id)===id); }
function showWarn(){ var w=document.getElementById("warnBar"); if(w) w.style.display="block"; }
function hideWarn(){ var w=document.getElementById("warnBar"); if(w) w.style.display="none"; }
function saveState(){
  try{ localStorage.setItem("mc_posts", JSON.stringify(state.posts)); localStorage.setItem("mc_library", JSON.stringify(state.library)); hideWarn(); return true; }
  catch(e){ console.warn("Save failed (storage full?)", e); showWarn(); return false; }
}
function loadState(){
  const stored = localStorage.getItem("mc_posts");
  if(stored){
    try{ state.posts = JSON.parse(stored).map(normalizePost); }
    catch(e){ console.error("Load failed", e); }
  }
  const lib = localStorage.getItem("mc_library");
  if(lib){ try{ state.library = JSON.parse(lib)||[]; }catch(e){ console.error("Library load failed", e); } }
  try{ const ui = JSON.parse(localStorage.getItem("mc_libui")||"{}"); if(ui.view==="strip"||ui.view==="grid") state.libView=ui.view; if(typeof ui.collapsed==="boolean") state.libCollapsed=ui.collapsed; }catch(e){}
}

/* ---------- blood splatter (brand atmosphere) ---------- */
function makeSplatter(w,h,count,seed,bias){
  let s=seed||1; const rnd=()=>{ s=(s*9301+49297)%233280; return s/233280; };
  const colors=["#2a2a2a","#1a1a1a","#3a3a3a","#141414","#222222"];
  let parts="";
  for(let i=0;i<count;i++){
    let cx=rnd()*w; if(bias==="right") cx=w*0.34+rnd()*w*0.66;
    const cy=rnd()*h, r=8+rnd()*70, c=colors[Math.floor(rnd()*colors.length)], o=(0.2+rnd()*0.55).toFixed(2), cxF=cx.toFixed(0), cyF=cy.toFixed(0);
    parts+='<circle cx="'+cxF+'" cy="'+cyF+'" r="'+r.toFixed(0)+'" fill="'+c+'" opacity="'+o+'"/>';
    parts+='<ellipse cx="'+cxF+'" cy="'+cyF+'" rx="'+(r*0.35).toFixed(0)+'" ry="'+(r*1.7).toFixed(0)+'" fill="'+c+'" opacity="'+o+'" transform="rotate('+(rnd()*360).toFixed(0)+' '+cxF+' '+cyF+')"/>';
    const drops=3+Math.floor(rnd()*6);
    for(let d=0;d<drops;d++){
      const dx=(cx+(rnd()-0.5)*r*4.5).toFixed(0), dy=(cy+(rnd()-0.5)*r*4.5).toFixed(0), dr=(1+rnd()*7).toFixed(0);
      parts+='<circle cx="'+dx+'" cy="'+dy+'" r="'+dr+'" fill="'+c+'" opacity="'+o+'"/>';
    }
  }
  return "data:image/svg+xml,"+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"' viewBox='0 0 "+w+" "+h+"'>"+parts+"</svg>");
}
if(!window.BRAND || window.BRAND.splatter!==false){
document.getElementById("hdrSplat").style.backgroundImage = 'url("'+makeSplatter(1600,160,16,7,"right")+'")';
document.getElementById("bgSplat").style.backgroundImage = 'url("'+makeSplatter(1600,1100,20,23)+'")';
}

/* ---------- iTunes song search (client-side JSONP, no backend) ---------- */
const songSearch = document.getElementById("songSearch");

/* shared 30-second preview player */
let currentAudio = null, currentBtn = null;
function setPlayIcon(btn, playing){ if(btn) btn.innerHTML = ic(playing?"pause":"play", btn.dataset.sz?+btn.dataset.sz:14); }
function stopPreview(){ if(currentAudio) currentAudio.pause(); if(currentBtn) setPlayIcon(currentBtn,false); currentAudio=null; currentBtn=null; }
function playPreview(url, btn){
  if(!url) return;
  if(currentAudio && currentAudio._url===url){ stopPreview(); return; }
  stopPreview();
  const a = new Audio(url); a._url = url;
  a.onended = ()=>{ if(currentBtn) setPlayIcon(currentBtn,false); currentAudio=null; currentBtn=null; };
  a.play().catch(()=>{});
  currentAudio = a; currentBtn = btn||null; setPlayIcon(btn,true);
}

function renderSelectedSong(){
  if(!state.form.song){ songSelected.style.display="none"; songSelected.innerHTML=""; return; }
  const art = state.form.songArt ? '<img src="'+state.form.songArt+'">' : '';
  const sub = state.form.songUrl ? 'iTunes · linked' : (state.form.song==="No music" ? "" : "saved as text");
  const playBtn = state.form.songPreview ? '<button class="ss-clear" id="ssPlay" data-sz="15" title="Preview">'+ic("play",15)+'</button>' : '';
  songSelected.style.display = "flex";
  songSelected.innerHTML = art +
    '<div class="ss-meta"><div class="ss-name">'+escapeHtml(state.form.song)+'</div>'+
    (sub?'<div class="ss-artist">'+sub+'</div>':'')+'</div>'+
    playBtn +
    '<button class="ss-clear" id="ssClear" title="Clear">'+ic("x",14)+'</button>';
  const pb = document.getElementById("ssPlay");
  if(pb) pb.onclick = ()=> playPreview(state.form.songPreview, pb);
  document.getElementById("ssClear").onclick = ()=>{ stopPreview(); state.form.song=""; state.form.songArt=""; state.form.songUrl=""; state.form.songPreview=""; renderSelectedSong(); };
}

function setSong(name, artist, art, url, preview){
  state.form.song = artist ? (name+" — "+artist) : name;
  state.form.songArt = art||""; state.form.songUrl = url||""; state.form.songPreview = preview||"";
  stopPreview();
  renderSelectedSong();
  songResults.classList.remove("show"); songResults.innerHTML=""; songSearch.value="";
}

function itunesURL(q){ return "https://itunes.apple.com/search?media=music&entity=song&limit=8&term="+encodeURIComponent(q); }
function mapItunes(results){
  return (results||[]).map(r=>({
    id: String(r.trackId||(r.trackName+"|"+r.artistName)),
    name: r.trackName||r.collectionName||"",
    artist: r.artistName||"",
    art: (r.artworkUrl100||r.artworkUrl60||"").replace("100x100","160x160"),
    url: r.trackViewUrl||r.collectionViewUrl||"",
    preview: r.previewUrl||""
  })).filter(t=>t.name);
}

/* Generic JSON fetch with timeout */
function fetchJSON(url, ms){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms||6000);
  return fetch(url, {signal:ctrl.signal})
    .then(r=>{ if(!r.ok) throw new Error("http "+r.status); return r.json(); })
    .then(d=>{ clearTimeout(t); return d; })
    .catch(e=>{ clearTimeout(t); throw e; });
}

/* JSONP last-resort (sidesteps CORS via injected script + callback) */
function itunesJSONP(q){
  return new Promise((resolve,reject)=>{
    const cb = "itCb_"+Date.now()+"_"+Math.floor(Math.random()*1e6);
    let script;
    const cleanup = ()=>{ try{ delete window[cb]; }catch(e){ window[cb]=void 0; } if(script&&script.parentNode) script.parentNode.removeChild(script); clearTimeout(timer); };
    const timer = setTimeout(()=>{ cleanup(); reject(new Error("timeout")); }, 5000);
    window[cb] = data=>{ cleanup(); resolve(mapItunes(data&&data.results)); };
    script = document.createElement("script");
    script.src = itunesURL(q)+"&callback="+cb;
    script.onerror = ()=>{ cleanup(); reject(new Error("network")); };
    document.head.appendChild(script);
  });
}

/* Layered search. Order = most reliable first.
   1) Netlify function (server-side, no CORS) — works once the folder is deployed.
   2) direct iTunes fetch — works when Apple's CORS happens to be honored.
   3) public CORS proxy — rescues single-file deploys with no function.
   4) JSONP — final fallback.
   Returns null only if every path fails (then the box saves your text). */
async function doSongSearch(q){
  try{ const d = await fetchJSON("/.netlify/functions/itunes?q="+encodeURIComponent(q), 6000);
       if(d && Array.isArray(d.tracks)) return d.tracks; }catch(e){}
  try{ const d = await fetchJSON(itunesURL(q), 5000); return mapItunes(d.results); }catch(e){}
  try{ const d = await fetchJSON("https://corsproxy.io/?url="+encodeURIComponent(itunesURL(q)), 7000); return mapItunes(d.results); }catch(e){}
  try{ return await itunesJSONP(q); }catch(e){}
  return null;
}

songSearch.oninput = ()=>{
  const q = songSearch.value.trim();
  clearTimeout(songTimer);
  if(!q){ songResults.classList.remove("show"); songResults.innerHTML=""; return; }
  songTimer = setTimeout(async ()=>{
    songResults.innerHTML = '<div class="songMsg">Searching...</div>';
    songResults.classList.add("show");
    const tracks = await doSongSearch(q);
    if(tracks===null){
      songResults.innerHTML = '<div class="songRes" data-manual="1"><div class="rmeta"><div class="rn">Use "'+escapeHtml(q)+'"</div><div class="ra">Search unavailable; save as text</div></div></div>';
    } else if(tracks.length===0){
      songResults.innerHTML = '<div class="songRes" data-manual="1"><div class="rmeta"><div class="rn">Use "'+escapeHtml(q)+'"</div><div class="ra">No matches; save as text</div></div></div>';
    } else {
      songResults._tracks = tracks;
      songResults.innerHTML = tracks.map(t=>
        '<div class="songRes" data-id="'+t.id+'">'+(t.art?'<img src="'+t.art+'">':'')+
        '<div class="rmeta"><div class="rn">'+escapeHtml(t.name)+'</div><div class="ra">'+escapeHtml(t.artist)+'</div></div>'+
        (t.preview?'<button class="rPlay" data-prev="'+encodeURIComponent(t.preview)+'" title="Preview">'+ic("play",14)+'</button>':'')+
        '</div>'
      ).join("");
    }
  }, 350);
};
songSearch.onkeydown = e=>{ if(e.key==="Enter"){ e.preventDefault(); const q=songSearch.value.trim(); if(q) setSong(q,"","","",""); } };
songResults.onclick = e=>{
  const playBtn = e.target.closest(".rPlay");
  if(playBtn){ e.stopPropagation(); playPreview(decodeURIComponent(playBtn.dataset.prev), playBtn); return; }
  const row = e.target.closest(".songRes"); if(!row) return;
  if(row.dataset.manual){ setSong(songSearch.value.trim(),"","","",""); return; }
  const t = (songResults._tracks||[]).find(x=>x.id===row.dataset.id);
  if(t) setSong(t.name, t.artist, t.art, t.url, t.preview);
};

function renderUpload(){
  const z = document.getElementById("uploadZone");
  const ratio = FRAMES[state.form.frame].ratio;
  const imgs = state.form.images;

  if(imgs.length===0){
    z.innerHTML = '<div class="drop" id="drop" style="aspect-ratio:'+ratio+'">'+
      ic("upload",26)+'<div class="t1">Drop images or click to upload</div>'+
      '<div class="t2">'+FRAMES[state.form.frame].label+' · select multiple for a carousel</div></div>';
    const d = document.getElementById("drop");
    d.onclick = ()=>document.getElementById("fileInput").click();
    d.ondragover = e=>{e.preventDefault();d.classList.add("drag");};
    d.ondragleave = ()=>d.classList.remove("drag");
    d.ondrop = e=>{e.preventDefault();d.classList.remove("drag");readFiles(e.dataTransfer.files);};
    return;
  }

  if(state.form.formSlide >= imgs.length) state.form.formSlide = imgs.length-1;
  const i = state.form.formSlide;
  let nav = "";
  if(imgs.length>1){
    nav = '<button class="carNav prev" id="fPrev">'+ic("chevL",16)+'</button>'+
          '<button class="carNav next" id="fNext">'+ic("chevR",16)+'</button>'+
          '<span class="carCount">'+ic("layers",11)+(i+1)+'/'+imgs.length+'</span>'+
          '<div class="carDots">'+imgs.map((_,d)=>'<i class="'+(d===i?"on":"")+'"></i>').join("")+'</div>';
  }
  const multi = imgs.length>1;
  const thumbs = imgs.map((src,idx)=>{
    const mvL = multi && idx>0 ? '<button class="mv mvL" data-mv="left" data-i="'+idx+'" title="Move left">'+ic("chevL",12)+'</button>' : '';
    const mvR = multi && idx<imgs.length-1 ? '<button class="mv mvR" data-mv="right" data-i="'+idx+'" title="Move right">'+ic("chevR",12)+'</button>' : '';
    const cover = (multi && idx===0) ? '<span class="cover">COVER</span>' : '';

  }).join("") + '<button class="addThumb" id="addMore">'+ic("plus",18)+'</button>';

    '<div class="previewWrap" style="aspect-ratio:'+ratio+'"><img src="'+imgs[i]+'">'+nav+'</div>'+

    document.getElementById("fNext").onclick = ()=>{ state.form.formSlide=(i+1)%imgs.length; renderUpload(); };

  });

      if(state.form.formSlide>=state.form.images.length) state.form.formSlide=Math.max(0,state.form.images.length-1); renderUpload(); };
  });
}

function fileToDataURL(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
}

/* downscale + re-encode uploads so real photos fit in browser storage */
function compressImage(file, maxDim, quality){
  return new Promise((resolve)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if(w >= h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h > w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      try{ resolve(canvas.toDataURL("image/jpeg", quality)); }
      catch(e){ fileToDataURL(file).then(resolve); }
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); fileToDataURL(file).then(resolve); };
    img.src = url;
  });
}

function readFiles(fileList){
  const files = Array.from(fileList||[]).filter(f=>f.type.startsWith("image/"));
  if(!files.length) return;
  Promise.all(files.map(f=>compressImage(f, 1080, 0.8)))
    .then(results=>{
      state.form.images = state.form.images.concat(results);
      state.form.formSlide = state.form.images.length-1;
      renderUpload();
    });
}

function actionsFor(p){
  const a = (act,col,icon,label)=>'<button class="act'+(label?"":" icon")+'" data-act="'+act+'" data-id="'+p.id+'" style="color:'+col+'">'+ic(icon,13)+(label?'<span>'+label+'</span>':'')+'</button>';
  const del = a("remove","var(--red)","trash");
  const share = a("share","var(--signature)","link", p.reviewId?"Re-share":"Share");
  if(p.status==="pending") return a("approved","var(--green)","check","Approve")+a("denied","var(--red)","x","Deny")+share+del;
  if(p.status==="draft") return a("pending","var(--gold)","send","Submit")+share+del;
  if(p.status==="approved") return a("publish","var(--green)","send","Publish")+a("posted","var(--blue)","checkCircle","Mark posted")+a("pending","var(--dim)","rotate")+share+del;

  return "";
}

const REVIEW_API = "/.netlify/functions/posts";
const BOARD_API = "/.netlify/functions/posts-board";
function isLive(){ return location.protocol==="http:"||location.protocol==="https:"; }

/* ----- live indicator ----- */
const LIVE_LABEL = { live:"Live", connecting:"Connecting", error:"Reconnecting", local:"Local only" };
function liveDotInner(){ return '<span class="blip"></span>'+(LIVE_LABEL[state.syncStatus]||"Local only"); }
function paintSync(){ const el=document.getElementById("liveDot"); if(el){ el.className="liveDot "+state.syncStatus; el.innerHTML=liveDotInner(); } }

/* ----- shared board sync ----- */
function serializePost(p){
  return { id:String(p.id), images:p.images||[], frame:p.frame, caption:p.caption||"",
    song:p.song||"", songArt:p.songArt||"", songUrl:p.songUrl||"", songPreview:p.songPreview||"",
    platform:p.platform||"", status:p.status||"draft", day:p.day||"", time:p.time||"",
    reviewId:p.reviewId, reviewUrl:p.reviewUrl, reviewDecision:p.reviewDecision||null,
    reviewComment:p.reviewComment||"", reviewer:p.reviewer||"", reviewedAt:p.reviewedAt||null,
    createdAt:p.createdAt||Date.now() };
}
function adoptServerPosts(posts){
  state.posts = (Array.isArray(posts)?posts:[]).map(normalizePost);
  renderStats(); renderFilters(); renderBoard();
}
function adoptServerLibrary(library){
  if(!Array.isArray(library)) return;
  state.library = library.map(it=>({ id:String(it.id), src:it.src }));
  const have = new Set(state.library.map(x=>x.id));
  Object.keys(state.librarySel).forEach(k=>{ if(!have.has(k)) delete state.librarySel[k]; });
  try{ localStorage.setItem("mc_library", JSON.stringify(state.library)); }catch(e){}
  renderLibrary();
}
function pushLibAdd(items){ return pushBoard("libAdd",{items}); }
function pushLibDelete(ids){ return pushBoard("libDelete",{ids:ids.map(String)}); }
async function boardList(force){
  try{
    const r = await fetch(BOARD_API + "?rev=" + (force ? "-1" : state.boardRev));
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    if(d.empty) return {empty:true};
    if(d.changed===false){ setSync("live"); return {changed:false}; }
    state.boardRev = d.rev;
    adoptServerPosts(d.posts);
    if(d.library) adoptServerLibrary(d.library);
    setSync("live");
    return {changed:true};
  }catch(e){ setSync("error"); return {error:true}; }
}
async function pushBoard(action, payload){
  if(!state.serverMode) return;
  try{
    const r = await fetch(BOARD_API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(Object.assign({action}, payload))});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    if(d && typeof d.rev!=="undefined"){ state.boardRev=d.rev; if(d.posts) adoptServerPosts(d.posts); if(d.library) adoptServerLibrary(d.library); }
    setSync("live");
  }catch(e){ setSync("error"); }
}
function pushCreate(p){ return pushBoard("create",{post:serializePost(p)}); }
function pushUpdate(p){ return pushBoard("update",{post:serializePost(p)}); }
function pushDelete(id){ return pushBoard("delete",{id:String(id)}); }
async function seedBoard(){
  try{
    const r = await fetch(BOARD_API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"seed", posts:state.posts.map(serializePost), library:state.library})});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    state.boardRev = d.rev; adoptServerPosts(d.posts); if(d.library) adoptServerLibrary(d.library);
  }catch(e){ setSync("error"); }
}
let pollTimer=null, pollCount=0;
function startPolling(){
  if(pollTimer) return;
  pollTimer = setInterval(async ()=>{
    if(document.hidden) return;            /* pause while tab is backgrounded */
    await boardList(false);
    pollCount++;
    if(pollCount % 5 === 0) syncApprovals(true);  /* fold in review decisions ~every 10s */
  }, 2000);
}
async function initServerBoard(){
  setSync("connecting");
  const localLib = (state.library||[]).slice();
  const res = await boardList(true);
  if(res.error){ setSync("error"); /* retry shortly */ setTimeout(initServerBoard, 4000); return; }
  state.serverMode = true;
  if(res.empty){ await seedBoard(); }      /* first run: publish the starter board */
  if((!state.library || state.library.length===0) && localLib.length){
    state.library = localLib;
    try{ localStorage.setItem("mc_library", JSON.stringify(state.library)); }catch(e){}
    renderLibrary();
    await pushLibAdd(localLib);
  }
  setSync("live");
  startPolling();
}

async function copyText(t){
  try{ await navigator.clipboard.writeText(t); return true; }
  catch(e){
    try{ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); const ok=document.execCommand("copy"); ta.remove(); return ok; }
    catch(e2){ return false; }
  }
}

const PUBLISH_API = "/.netlify/functions/publish";
const PUB_PLATFORMS = [["instagram","Instagram",true],["facebook","Facebook",true],["tiktok","TikTok",false],["youtube","YouTube (needs video)",false]];
function nextScheduleISO(day, time12){
  const names=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const target=names.indexOf(day);
  if(target<0) return null;
  const t24=to24(time12||"9:00 AM"); const parts=t24.split(":"); const hh=parseInt(parts[0],10), mm=parseInt(parts[1],10);
  const now=new Date(); const d=new Date(now); d.setHours(isNaN(hh)?9:hh, isNaN(mm)?0:mm, 0, 0);
  let add=(target-now.getDay()+7)%7;
  if(add===0 && d<=now) add=7;
  d.setDate(d.getDate()+add);
  return d.toISOString();
}
function showPublishModal(p){
  if(!isLive()){ alert("Publishing needs the live site. Open your Netlify URL (not the file preview)."); return; }
  const wrap=document.createElement("div"); wrap.className="mcModalWrap";
  const boxes=PUB_PLATFORMS.map(function(row){ var v=row[0],label=row[1],on=row[2];
    return '<label style="display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer"><input type="checkbox" data-plat="'+v+'"'+(on?" checked":"")+' style="width:18px;height:18px;accent-color:var(--gold)"> '+label+'</label>'; }).join("");
  const canSched=!!p.day;
  wrap.innerHTML='<div class="mcModal">'+
    '<h3>Publish to socials</h3>'+
    '<p>Choose where to send this post. Image posts work on Instagram, Facebook, and TikTok; YouTube needs a video.</p>'+
    '<div style="margin:6px 0 14px">'+boxes+'</div>'+
    '<div id="pubStatus" style="font-size:13px;color:var(--faint);min-height:18px;margin-bottom:10px"></div>'+
    '<div class="mRow">'+
      (canSched?'<button class="mBtn" id="pubSchedBtn">Schedule for '+escapeHtml((DAY_SHORT[p.day]||p.day)+" "+p.time)+'</button>':'')+
      '<button class="mBtn primary" id="pubNowBtn">Publish now</button>'+
      '<button class="mBtn" id="pubCancelBtn">Cancel</button>'+
    '</div></div>';
  document.body.appendChild(wrap);
  const close=function(){ wrap.remove(); };
  wrap.addEventListener("click",function(e){ if(e.target===wrap) close(); });
  wrap.querySelector("#pubCancelBtn").onclick=close;
  const stat=wrap.querySelector("#pubStatus");
  const getPlats=function(){ return Array.prototype.slice.call(wrap.querySelectorAll("[data-plat]:checked")).map(function(c){return c.dataset.plat;}); };
  wrap.querySelector("#pubNowBtn").onclick=function(){ doPublish(p,getPlats(),null,wrap,stat); };
  const sb=wrap.querySelector("#pubSchedBtn"); if(sb) sb.onclick=function(){ doPublish(p,getPlats(),nextScheduleISO(p.day,p.time),wrap,stat); };
}
async function doPublish(p,platforms,scheduleDate,wrap,stat){
  if(!platforms.length){ stat.style.color="var(--red)"; stat.textContent="Pick at least one platform."; return; }
  wrap.querySelectorAll("button").forEach(function(b){ b.disabled=true; });
  stat.style.color="var(--faint)"; stat.textContent=scheduleDate?"Scheduling…":"Publishing…";
  try{
    const r=await fetch(PUBLISH_API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({postId:p.id,platforms:platforms,scheduleDate:scheduleDate||undefined})});
    const d=await r.json().catch(function(){return {};});
    if(!r.ok || d.error){ const det=d.detail?(typeof d.detail==="string"?d.detail:JSON.stringify(d.detail)):(d.error||("HTTP "+r.status)); throw new Error(det); }
    stat.style.color="var(--green)"; var msg=scheduleDate?"Scheduled.":"Published.";
    if(d.skipped && d.skipped.length) msg+=" Skipped (not connected): "+d.skipped.join(", ");
    stat.textContent=msg;
    if(!scheduleDate){ p.status="posted"; saveState(); renderStats(); renderFilters(); renderBoard(); pushUpdate(p); }
    setTimeout(function(){ wrap.remove(); },1300);
  }catch(e){
    stat.style.color="var(--red)"; stat.textContent="Failed: "+e.message;
    wrap.querySelectorAll("button").forEach(function(b){ b.disabled=false; });
  }
}

async function shareForApproval(p){
  if(!isLive()){ alert("Sharing needs the live site. Open your Netlify URL (not the file preview), then tap Share."); return; }
  const btn = document.querySelector('[data-act="share"][data-id="'+p.id+'"]');
  if(btn) btn.disabled = true;
  try{
    const r = await fetch(REVIEW_API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"share",post:{
        images:p.images,caption:p.caption,frame:p.frame,platform:p.platform,
        song:p.song,songArt:p.songArt,songUrl:p.songUrl,songPreview:p.songPreview,day:p.day,time:p.time
      }})});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    if(!d.id) throw new Error("no id returned");
    p.reviewId = d.id;
    p.reviewUrl = location.origin + "/review.html?id=" + d.id;
    p.reviewDecision = null; p.reviewComment = ""; p.reviewer = ""; p.reviewedAt = null;
    saveState(); renderBoard(); pushUpdate(p);
    showShareModal(p.reviewUrl);
  }catch(e){
    alert("Couldn't create a review link. The posts function must be deployed (Git deploy with Netlify Blobs). Details: "+e.message);
  }finally{ if(btn) btn.disabled = false; }
}

async function syncApprovals(silent){
  if(!isLive()){ if(!silent) alert("Open the live Netlify site to check responses."); return; }
  const shared = state.posts.filter(p=>p.reviewId);
  if(shared.length===0){ if(!silent) alert("No posts have been shared for approval yet. Tap Share on a post first."); return; }
  const sb = document.getElementById("syncBtn"); if(sb){ sb.disabled=true; }
  let changed=false, got=false; const changedPosts=[];
  for(const p of shared){
    try{
      const r = await fetch(REVIEW_API+"?id="+encodeURIComponent(p.reviewId));
      if(!r.ok) continue;
      const rec = await r.json();
      if(rec && rec.decision && rec.reviewedAt){
        got=true;
        if(rec.reviewedAt!==p.reviewedAt){
          p.reviewDecision = rec.decision;
          p.reviewComment = rec.comment||"";
          p.reviewer = rec.reviewer||"";
          p.reviewedAt = rec.reviewedAt;
          p.status = rec.decision; /* approved | denied */
          changed=true; changedPosts.push(p);
        }
      }
    }catch(e){}
  }
  if(sb){ sb.disabled=false; }
  if(changed){ saveState(); renderStats(); renderFilters(); renderBoard(); changedPosts.forEach(pushUpdate); if(!silent) alert("Responses updated."); }
  else if(!silent){ alert(got?"No new responses since last check.":"No responses yet."); }
}

/* ---------- events ---------- */
document.getElementById("fileInput").onchange = e=>{ readFiles(e.target.files); e.target.value=""; };
document.getElementById("caption").oninput = e=>{state.form.caption=e.target.value;document.getElementById("capCount").textContent=e.target.value.length;};
daySel.onchange = e=>state.form.day=e.target.value;
timeSel.onchange = e=>state.form.time=to12(e.target.value);

document.getElementById("frameSeg").onclick = e=>{const b=e.target.closest("[data-frame]");if(b){state.form.frame=b.dataset.frame;renderSegs();renderUpload();}};
document.getElementById("platformSeg").onclick = e=>{const b=e.target.closest("[data-plat]");if(b){state.form.platform=b.dataset.plat;renderSegs();}};
document.getElementById("filters").onclick = e=>{const b=e.target.closest("[data-filter]");if(b){state.filter=b.dataset.filter;renderFilters();renderBoard();}};

function createPost(status){
  if(state.form.images.length===0){alert("Upload at least one image.");return;}
  if(!state.form.caption.trim()){alert("Add a caption first.");return;}
  const post = {
    id:uid(),images:state.form.images.slice(),frame:state.form.frame,
    caption:state.form.caption.trim(),song:state.form.song,songArt:state.form.songArt,songUrl:state.form.songUrl,songPreview:state.form.songPreview,platform:state.form.platform,
    day:state.form.day,time:state.form.time,status:status,createdAt:Date.now()
  };
  state.posts.unshift(post);
  stopPreview();
  state.form = {images:[],formSlide:0,caption:"",song:"",songArt:"",songUrl:"",songPreview:"",frame:"feed",platform:"Instagram",day:"Monday",time:"9:00 AM"};
  document.getElementById("caption").value=""; document.getElementById("capCount").textContent="0";
  songSearch.value=""; songResults.classList.remove("show"); songResults.innerHTML=""; renderSelectedSong();
  daySel.value="Monday"; timeSel.value="09:00";
  state.filter="all";
  renderSegs();renderUpload();renderStats();renderFilters();renderBoard();
  saveState();
  pushCreate(post);
}
document.getElementById("saveDraft").onclick = ()=>createPost("draft");
document.getElementById("submit").onclick = ()=>createPost("pending");

document.getElementById("boardBody").onclick = e=>{
  /* carousel navigation — update in place, no full re-render */
  const nav = e.target.closest("[data-nav]");
  if(nav){
    const id = nav.dataset.id, p = findPost(id);
    if(!p) return;
    const n = p.images.length;
    let idx = slide[id]||0;
    idx = (idx + (nav.dataset.nav==="next"?1:-1) + n) % n;
    slide[id] = idx;
    const card = nav.closest(".cardImg");
    card.querySelector(".carImg").src = p.images[idx];
    card.querySelector(".cnum").textContent = (idx+1);
    card.querySelectorAll(".carDots i").forEach((dot,di)=>dot.classList.toggle("on",di===idx));
    return;
  }
  /* status actions */
  const b = e.target.closest("[data-act]"); if(!b) return;
  const act = b.dataset.act;
  if(act==="syncAll"){ syncApprovals(false); return; }
  const id = b.dataset.id;
  if(act==="share"){ const p=findPost(id); if(p) shareForApproval(p); return; }
  if(act==="publish"){ const p=findPost(id); if(p) showPublishModal(p); return; }
  if(act==="copylink"){ const p=findPost(id); if(p&&p.reviewUrl){ copyText(p.reviewUrl).then(ok=>{ const o=b.innerHTML; b.innerHTML=ic("check",12)+(ok?"Copied":"Copy failed"); setTimeout(()=>b.innerHTML=o,1500); }); } return; }
  if(act==="preview"){ playPreview(decodeURIComponent(b.dataset.prev||""), b); return; }
  if(act==="edit"){ editing[id]=true; renderBoard(); return; }
  if(act==="cancelSched"){ delete editing[id]; renderBoard(); return; }
  if(act==="saveSched"){
    const p=findPost(id);
    const dsel=document.getElementById("ed-day-"+id), tsel=document.getElementById("ed-time-"+id);
    if(p&&dsel&&tsel){ p.day=dsel.value; p.time=to12(tsel.value); }
    delete editing[id]; saveState(); renderStats();renderFilters();renderBoard();
    if(p) pushUpdate(p);
    return;
  }
  if(act==="remove"){ if(!confirm("Remove this post from the board? This can't be undone.")) return; state.posts = state.posts.filter(p=>String(p.id)!==String(id)); delete slide[id]; saveState(); renderStats();renderFilters();renderBoard(); pushDelete(id); return; }
  else { const p = findPost(id); if(p){ p.status=act; saveState(); renderStats();renderFilters();renderBoard(); pushUpdate(p); } }
};

/* ---------- init ---------- */
loadState();
renderSegs();renderUpload();renderStats();renderFilters();renderBoard();renderLibrary();
if(isLive()){
  initServerBoard();      /* posts become shared + real-time */
  syncApprovals(true);
} else {
  setSync("local");       /* file:// preview — posts stay in this browser only */
}
